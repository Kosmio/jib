name: Dev

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - '*'

jobs:
  docker-strapi:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Strapi
        run: |
          VERSION=$(cat VERSION)
          docker build --no-cache \
            --build-arg ADMIN_URL=/strapi/admin \
            -f infra/docker/strapi/Dockerfile \
            -t ghcr.io/kosmio/jib-strapi:${VERSION} .
          docker push ghcr.io/kosmio/jib-strapi:${VERSION}

  docker-web:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Web
        run: |
          VERSION=$(cat VERSION)
          docker build --no-cache -f infra/docker/website/Dockerfile -t ghcr.io/kosmio/jib-web:${VERSION} .
          docker push ghcr.io/kosmio/jib-web:${VERSION}

  docker-mcp:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push MCP
        run: |
          VERSION=$(cat VERSION)
          docker build --no-cache -f infra/docker/mcp/Dockerfile -t ghcr.io/kosmio/jib-mcp:${VERSION} .
          docker push ghcr.io/kosmio/jib-mcp:${VERSION}
