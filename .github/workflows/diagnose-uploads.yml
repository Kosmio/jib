name: Diagnose Uploads

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H -p 2234 ${{ vars.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Inspect server
        run: |
          ssh -p 2234 kosmio@${{ vars.DEPLOY_HOST }} 'bash -s' <<'ENDSSH'
          echo "=========================================="
          echo "ALL CONTAINERS (incl. stopped)"
          echo "=========================================="
          docker ps -a --filter name=jib --format "table {{.Names}}\t{{.Status}}\t{{.CreatedAt}}\t{{.Image}}"
          echo ""
          echo "=========================================="
          echo "STRAPI LOGS (last 200 lines)"
          echo "=========================================="
          docker logs --tail=200 jib-strapi 2>&1 || echo "no logs"
          echo ""
          echo "=========================================="
          echo "STRAPI UPLOADS DIR"
          echo "=========================================="
          docker exec jib-strapi sh -c 'ls /app/public/uploads 2>/dev/null | wc -l' || echo "container not running"
          ENDSSH
