# Production environment overlay
# Uses built Docker images, resource limits, always restart
# Traefik handles TLS termination with Let's Encrypt
# Single domain: Strapi served under /strapi path, Astro catches everything else

services:
  traefik:
    ports:
      - "80:80"
      - "443:443"
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M

  postgres:
    volumes:
      - postgres-data:/var/lib/postgresql
    restart: always
    ports:
      - "127.0.0.1:5432:5432"
    deploy:
      resources:
        limits:
          memory: 2G

  strapi:
    labels:
      traefik.enable: "true"
      traefik.http.routers.strapi.rule: "Host(`${HOST_NAME}`) && PathPrefix(`/strapi`)"
      traefik.http.routers.strapi.entrypoints: websecure
      traefik.http.routers.strapi.tls.certresolver: letsencrypt-resolver
      traefik.http.routers.strapi.middlewares: strip-strapi
      traefik.http.middlewares.strip-strapi.stripprefix.prefixes: "/strapi"
      traefik.http.services.strapi.loadbalancer.server.port: "1337"
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G

  web:
    labels:
      traefik.enable: "true"
      traefik.http.routers.web.rule: "Host(`${HOST_NAME}`)"
      traefik.http.routers.web.entrypoints: websecure
      traefik.http.routers.web.tls.certresolver: letsencrypt-resolver
      traefik.http.services.web.loadbalancer.server.port: "80"
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G

volumes:
  postgres-data:
    name: jib-postgres-data
  traefik-certificates:
    name: jib-traefik-certificates
