# Production environment overlay
# Uses built Docker images, resource limits, always restart
# Relies on existing coolify-proxy (Traefik) for TLS termination
# Single domain: Strapi served under /strapi path, Astro catches everything else

services:
  # Disable the built-in traefik — we use coolify-proxy instead
  traefik:
    profiles:
      - disabled

  postgres:
    volumes:
      - postgres-data:/var/lib/postgresql
    restart: always
    ports:
      - "127.0.0.1:5432:5432"
    deploy:
      resources:
        limits:
          memory: 2G

  strapi:
    labels:
      traefik.enable: "true"
      traefik.docker.network: coolify
      traefik.http.routers.jib-strapi.rule: "Host(`${HOST_NAME}`) && PathPrefix(`/strapi`)"
      traefik.http.routers.jib-strapi.entrypoints: https
      traefik.http.routers.jib-strapi.tls: "true"
      traefik.http.routers.jib-strapi.tls.certresolver: letsencrypt
      traefik.http.routers.jib-strapi.middlewares: jib-strip-strapi
      traefik.http.middlewares.jib-strip-strapi.stripprefix.prefixes: "/strapi"
      traefik.http.services.jib-strapi.loadbalancer.server.port: "1337"
    networks:
      - net
      - coolify
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G

  web:
    labels:
      traefik.enable: "true"
      traefik.docker.network: coolify
      traefik.http.routers.jib-web.rule: "Host(`${HOST_NAME}`)"
      traefik.http.routers.jib-web.entrypoints: https
      traefik.http.routers.jib-web.tls: "true"
      traefik.http.routers.jib-web.tls.certresolver: letsencrypt
      traefik.http.routers.jib-web.priority: "1"
      traefik.http.services.jib-web.loadbalancer.server.port: "80"
    networks:
      - net
      - coolify
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G

networks:
  coolify:
    external: true

volumes:
  postgres-data:
    name: jib-postgres-data
