# Development environment overlay
# Uses built Docker images, restart policies

services:
  postgres:
    volumes:
      - postgres-data:/var/lib/postgresql
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"

  strapi:
    restart: unless-stopped

  web:
    restart: unless-stopped

volumes:
  postgres-data:
    name: skeleton-postgres-data
